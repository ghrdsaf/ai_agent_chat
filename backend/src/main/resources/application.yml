spring:
  application:
    name: ai-agent-chat-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_agent_chat
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080

ai:
  service:
    base-url: http://localhost:8000

